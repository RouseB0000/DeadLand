<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deadland</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Cinzel:wght@300&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: 'Cormorant Garamond', serif; color: #d1d1d1; animation: fadeInBody 2s ease-out; }
        @keyframes fadeInBody { from { opacity: 0; } to { opacity: 1; } }

        /* Фон */
        #space { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; }

        /* Шапка: полупрозрачная и размытая */
        header { 
            padding: 30px 60px; 
            background: rgba(0, 0, 0, 0.3); 
            backdrop-filter: blur(10px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            align-items: center; 
        }
        .deadland-text { font-size: 2.2rem; color: #aaa; letter-spacing: 0.6rem; text-transform: uppercase; grid-column: 2; justify-self: center; font-weight: 300; }

        .eye-svg { grid-column: 3; justify-self: end; width: 80px; height: 80px; cursor: pointer; fill: #555; transition: 0.3s; }
        .eye-svg:hover { fill: #fff; }
        .pupil { animation: movePupil 6s infinite ease-in-out; }
        @keyframes movePupil { 0%, 100% { transform: translate(0, 0); } 33% { transform: translate(5px, 0); } 66% { transform: translate(0, 5px); } }

        main { height: 80vh; display: flex; justify-content: center; align-items: center; }
        .page { display: none; text-align: center; opacity: 0; transition: opacity 1.5s; width: 80%; }
        .page.active { display: block; opacity: 1; }

        /* Библиотека: анимация появления и серебряное свечение */
        .library-title { 
            font-family: 'Cinzel', serif; 
            font-size: 14rem; 
            margin: 0; 
            color: #fff; 
            animation: fadeIn 2s ease-in, superGlow 3s infinite alternate; 
            letter-spacing: 1rem; 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes superGlow { 
            from { text-shadow: 0 0 10px #ccc, 0 0 20px #888; } 
            to { text-shadow: 0 0 30px #fff, 0 0 60px #eee, 0 0 100px #ccc; } 
        }

        .oracle-input { background: rgba(0,0,0,0.5); border: 1px solid #444; color: #fff; font-size: 2rem; width: 100%; max-width: 500px; text-align: center; padding: 10px; font-family: 'Cormorant Garamond', serif; margin-bottom: 30px; }
        .oracle-btn { background: transparent; border: 1px solid #444; color: #777; padding: 10px 30px; cursor: pointer; transition: 0.4s; font-size: 1.2rem; text-transform: uppercase; }
        .oracle-btn:hover { border-color: #fff; color: #fff; }
        #answer-display { margin-top: 40px; font-size: 2.5rem; color: #fff; min-height: 100px; opacity: 0; transition: opacity 1s; }

        #menu { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .menu-item { font-size: 3rem; margin: 30px; cursor: pointer; color: #666; transition: all 0.5s ease; }
        .menu-item:hover { color: #fff; text-shadow: 0 0 20px #fff; letter-spacing: 10px; }
    </style>
</head>
<body>

    <canvas id="space"></canvas>

    <header>
        <div class="spacer"></div>
        <div class="deadland-text">Deadland</div>
        <svg class="eye-svg" onclick="toggleMenu()" viewBox="0 0 100 100">
            <path d="M50 10C25 10 10 50 10 50c0 0 15 40 40 40s40-40 40-40-15-40-40-40zM50 80c-16.6 0-30-13.4-30-30s13.4-30 30-30 30 13.4 30 30-13.4 30-30 30z"/>
            <circle class="pupil" cx="50" cy="50" r="10" fill="#fff"/>
        </svg>
    </header>

    <main>
        <div id="home" class="page active"><h1 class="library-title">LIBRARY</h1></div>
        <div id="library" class="page"><h2>Library</h2><p>Здесь твои записи...</p></div>
        <div id="about" class="page"><h2>About Us</h2><p>Тайны Deadland...</p></div>
        <div id="oracle" class="page">
            <h2>The Oracle</h2>
            <input type="text" class="oracle-input" id="question" placeholder="Задай свой вопрос...">
            <br><button class="oracle-btn" onclick="getOracleAnswer()">Получить ответ</button>
            <div id="answer-display"></div>
        </div>
    </main>

    <div id="menu">
        <div class="menu-item" onclick="showPage('home')">Home</div>
        <div class="menu-item" onclick="showPage('library')">Library</div>
        <div class="menu-item" onclick="showPage('about')">About Us</div>
        <div class="menu-item" onclick="showPage('oracle')">Oracle</div>
    </div>

    <script>
        const canvas = document.getElementById('space');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let stars = []; let nebulaClouds = [];
        for(let i=0; i<400; i++) { stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*1.5, angle: Math.random()*Math.PI*2, dist: Math.random()*canvas.width/2 }); }
        for(let i=0; i<5; i++) { nebulaClouds.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*300 + 200 }); }

        let time = 0;
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.08)"; ctx.fillRect(0,0,canvas.width, canvas.height);
            time += 0.005;
            let centerX = canvas.width / 2; let centerY = canvas.height / 2;

            nebulaClouds.forEach(c => {
                let grad = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.size);
                grad.addColorStop(0, "rgba(75, 0, 130, 0.05)"); grad.addColorStop(1, "transparent");
                ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
            });

            let holePulse = Math.sin(time) * 10;
            let grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 100 + holePulse);
            grad.addColorStop(0, "rgba(0,0,0,1)"); grad.addColorStop(0.5, "rgba(50, 0, 100, 0.5)"); grad.addColorStop(1, "transparent");
            ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(centerX, centerY, 150, 0, Math.PI*2); ctx.fill();

            stars.forEach(s => {
                s.angle += 0.005 + (Math.sin(time) * 0.002);
                let x = centerX + Math.cos(s.angle) * s.dist;
                let y = centerY + Math.sin(s.angle) * s.dist;
                ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(x, y, s.size, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();

        function toggleMenu() { const menu = document.getElementById('menu'); menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex'; }
        function showPage(pageId) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(pageId).classList.add('active'); toggleMenu(); }
        const answers = ["Звезды говорят: время еще не пришло.", "Ответ скрыт в тенях.", "Будущее туманно, но путь ясен.", "Смотри глубже, за пределы дыры."];
        function getOracleAnswer() { const display = document.getElementById('answer-display'); display.innerText = answers[Math.floor(Math.random() * answers.length)]; display.style.opacity = 1; }
    </script>
    <audio id="bg-music" loop>
        <source src="ghostly-sorrow_88011.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Запуск музыки после первого клика
        const audio = document.getElementById('bg-music');
        document.body.addEventListener('click', function() {
            if (audio.paused) {
                audio.play().catch(e => console.log("Музыка ждет взаимодействия"));
            }
        }, { once: true });
    </script>
</body>
</html>
